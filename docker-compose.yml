version: "3.9"

services:
  backend:
    build: ./backend
    container_name: lab04-backend
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5001
    container_name: lab04-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped